/* AQ.Gacha — quay thẻ, pity system, lưu trữ kho */
window.AQ = window.AQ || {};

AQ.Storage = {
  KEY_INV: 'aq-inventory',
  KEY_PITY: 'aq-pity',
  KEY_CURRENCY: 'aq-currency',
  KEY_TEAM: 'aq-team',
  KEY_PROFILE: 'aq-profile',
  KEY_ADMIN: 'aq-admin',

  load(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; }
    catch { return fallback; }
  },
  save(key, val) { localStorage.setItem(key, JSON.stringify(val)); },

  getInventory() { return this.load(this.KEY_INV, []); },
  setInventory(inv) { this.save(this.KEY_INV, inv); },

  getPity() { return this.load(this.KEY_PITY, { count: 0, count6: 0, count7: 0 }); },
  setPity(p) { this.save(this.KEY_PITY, p); },

  getCurrency() { return this.load(this.KEY_CURRENCY, { gem: 1600, ticket: 10 }); },
  setCurrency(c) { this.save(this.KEY_CURRENCY, c); },

  getTeam() { return this.load(this.KEY_TEAM, [null, null, null, null]); },
  setTeam(t) { this.save(this.KEY_TEAM, t); },

  isAdmin() { return this.load(this.KEY_ADMIN, false); },
  setAdmin(v) { this.save(this.KEY_ADMIN, v); }
};

AQ.Admin = {
  PASSWORD: 'zzollyan',
  login(pw) {
    if (pw === this.PASSWORD) { AQ.Storage.setAdmin(true); return true; }
    return false;
  },
  logout() { AQ.Storage.setAdmin(false); },
  isActive() { return AQ.Storage.isAdmin(); }
};

AQ.Gacha = {
  COST_GEM: 160,

  /** trả về tỉ lệ hiện tại đã áp dụng pity mềm */
  currentRates(pity) {
    const r = {};
    for (const k in AQ.RARITY) r[k] = AQ.RARITY[k].rateBase;
    if (pity.count >= AQ.CONST.PITY_SOFT) {
      const bonus = (pity.count - AQ.CONST.PITY_SOFT + 1) * 4;
      r[5] += bonus; r[6] += bonus * 0.3;
    }
    return r;
  },

  rollRarity(pity) {
    if (pity.count7 + 1 >= AQ.CONST.PITY_HARD_7) return 7;
    if (pity.count6 + 1 >= AQ.CONST.PITY_HARD_6) return 6;
    if (pity.count + 1 >= AQ.CONST.PITY_HARD) return Math.random() < 0.15 ? 6 : 5;

    const rates = this.currentRates(pity);
    const total = Object.values(rates).reduce((a, b) => a + b, 0);
    let roll = Math.random() * total;
    for (const k of [7, 6, 5, 4, 3, 2, 1]) {
      if (roll < rates[k]) return k;
      roll -= rates[k];
    }
    return 1;
  },

  pickCardByRarity(rarity) {
    const pool = AQ.CARDS.filter(c => c.rarity === rarity);
    if (!pool.length) return AQ.CARDS[AQ.CARDS.length - 1];
    return pool[Math.floor(Math.random() * pool.length)];
  },

  updatePity(pity, rarity) {
    pity.count++; pity.count6++; pity.count7++;
    if (rarity >= 5) pity.count = 0;
    if (rarity >= 6) pity.count6 = 0;
    if (rarity >= 7) pity.count7 = 0;
    return pity;
  },

  /** quay n lần, trả {results:[{card,rarity,isNew}], pity, currency} */
  pull(n = 1) {
    const currency = AQ.Storage.getCurrency();
    const isAdmin = AQ.Admin.isActive();
    const cost = isAdmin ? 0 : this.COST_GEM * n;
    if (!isAdmin && currency.gem < cost) return { error: 'NOT_ENOUGH_GEM' };
    currency.gem -= cost;

    let pity = AQ.Storage.getPity();
    const inv = AQ.Storage.getInventory();
    const results = [];

    for (let i = 0; i < n; i++) {
      const rarity = this.rollRarity(pity);
      pity = this.updatePity(pity, rarity);
      const card = this.pickCardByRarity(rarity);
      const existing = inv.find(x => x.cardId === card.id);
      const isNew = !existing;
      if (existing) existing.dupes = (existing.dupes || 0) + 1;
      else inv.push({ cardId: card.id, level: 1, ascension: 0, skillLv: { basic: 1, skill: 1, ultimate: 1 }, dupes: 0, equipment: [] });
      results.push({ card, rarity, isNew });
    }

    AQ.Storage.setCurrency(currency);
    AQ.Storage.setPity(pity);
    AQ.Storage.setInventory(inv);
    return { results, pity, currency };
  },

  /** thời lượng animation gợi ý (ms) theo sao, dùng cho UI */
  animDuration(rarity) {
    return rarity >= 7 ? 4500 : rarity >= 6 ? 3200 : rarity >= 5 ? 2600 : rarity >= 4 ? 1800 : 1000;
  }
};
/* AQ.Battle — turn-based theo SPD, break gauge, element advantage */
window.AQ = window.AQ || {};

AQ.Progression = {
  statAtLevel(base, level, ascension) {
    const lvFactor = 1 + (level - 1) * 0.045;
    const ascFactor = 1 + ascension * 0.12;
    return Math.round(base * lvFactor * ascFactor);
  },
  resolvedStats(card, unit) {
    const lvl = unit.level || 1, asc = unit.ascension || 0;
    return {
      hp: this.statAtLevel(card.hp, lvl, asc),
      atk: this.statAtLevel(card.atk, lvl, asc),
      def: this.statAtLevel(card.def, lvl, asc),
      spd: card.spd + Math.floor(asc * 1.5),
      maxEnergy: 100
    };
  }
};

AQ.Unit = class {
  constructor(card, unitData, side) {
    this.card = card;
    this.side = side; // 'player' | 'enemy'
    const stats = AQ.Progression.resolvedStats(card, unitData || {});
    this.maxHp = stats.hp; this.hp = stats.hp;
    this.atk = stats.atk; this.def = stats.def; this.spd = stats.spd;
    this.energy = 0; this.maxEnergy = 100;
    this.element = card.element; this.role = card.role;
    this.breakGauge = 100; this.broken = false; this.brokenTurns = 0;
    this.buffs = []; this.debuffs = [];
    this.alive = true;
  }
  isElementWeakAgainst(attackerElement) {
    return AQ.ELEMENT_ADV[attackerElement] === this.element;
  }
};

AQ.BattleEngine = class {
  constructor(playerUnits, enemyUnits, log = console.log) {
    this.units = [...playerUnits, ...enemyUnits];
    this.turnOrder = [];
    this.log = log;
    this.turnCount = 0;
  }

  buildTurnOrder() {
    this.turnOrder = this.units
      .filter(u => u.alive)
      .sort((a, b) => b.spd - a.spd);
  }

  damage(attacker, target, mult, actionElement) {
    let raw = attacker.atk * mult - target.def * AQ.CONST.DEF_FACTOR;
    raw = Math.max(raw, 1);

    const isAdv = AQ.ELEMENT_ADV[attacker.element] === target.element;
    if (isAdv) raw *= AQ.CONST.ELEMENT_ADV_MULT;

    if (target.broken) raw *= AQ.CONST.BREAK_STUN_MULT;

    if (isAdv && !target.broken) {
      target.breakGauge -= 25;
      if (target.breakGauge <= 0) {
        target.breakGauge = 0;
        target.broken = true;
        target.brokenTurns = 1;
        this.log(`${target.card.name} bị BREAK! Choáng + nhận 50% dmg tăng.`);
      }
    }

    target.hp = Math.max(0, target.hp - Math.round(raw));
    if (target.hp === 0) target.alive = false;
    return Math.round(raw);
  }

  basicAttack(attacker, target) {
    const dmg = this.damage(attacker, target, AQ.CONST.BASIC_MULT);
    attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + AQ.CONST.BASIC_ENERGY);
    this.log(`${attacker.card.name} dùng [${attacker.card.skills.basic.name}] gây ${dmg} dmg lên ${target.card.name}.`);
    return dmg;
  }

  skillAttack(attacker, target) {
    if (attacker.energy < AQ.CONST.SKILL_ENERGY) return null;
    const dmg = this.damage(attacker, target, AQ.CONST.SKILL_MULT);
    attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + AQ.CONST.SKILL_ENERGY);
    this.log(`${attacker.card.name} dùng [${attacker.card.skills.skill.name}] gây ${dmg} dmg lên ${target.card.name}.`);
    return dmg;
  }

  ultimateAttack(attacker, target) {
    if (attacker.energy < AQ.CONST.ULT_ENERGY_COST) return null;
    const dmg = this.damage(attacker, target, AQ.CONST.ULT_MULT);
    attacker.energy = 0;
    this.log(`${attacker.card.name} kích hoạt TUYỆT KỸ [${attacker.card.skills.ultimate.name}] gây ${dmg} dmg lên ${target.card.name}!`);
    return dmg;
  }

  takeTurn(unit, chooseAction, chooseTarget) {
    if (!unit.alive) return;
    if (unit.broken && unit.brokenTurns > 0) {
      unit.brokenTurns--;
      if (unit.brokenTurns === 0) { unit.broken = false; unit.breakGauge = 100; }
      this.log(`${unit.card.name} đang choáng, bỏ lượt.`);
      return;
    }
    const enemies = this.units.filter(u => u.side !== unit.side && u.alive);
    if (!enemies.length) return;
    const target = chooseTarget ? chooseTarget(unit, enemies) : enemies[0];
    const action = chooseAction ? chooseAction(unit) : (unit.energy >= AQ.CONST.ULT_ENERGY_COST ? 'ultimate' : unit.energy >= AQ.CONST.SKILL_ENERGY ? 'skill' : 'basic');

    if (action === 'ultimate') this.ultimateAttack(unit, target) ?? this.basicAttack(unit, target);
    else if (action === 'skill') this.skillAttack(unit, target) ?? this.basicAttack(unit, target);
    else this.basicAttack(unit, target);
  }

  isOver() {
    const p = this.units.some(u => u.side === 'player' && u.alive);
    const e = this.units.some(u => u.side === 'enemy' && u.alive);
    return !p || !e;
  }

  winner() {
    if (!this.isOver()) return null;
    return this.units.some(u => u.side === 'player' && u.alive) ? 'player' : 'enemy';
  }

  runRound(chooseAction, chooseTarget) {
    this.turnCount++;
    this.buildTurnOrder();
    for (const unit of this.turnOrder) {
      if (this.isOver()) break;
      this.takeTurn(unit, chooseAction, chooseTarget);
    }
  }
};

</script>

<script>
const ELEMENT_ICON = { Fire:'🔥', Water:'💧', Wind:'🌪️', Earth:'🪨', Light:'✨', Dark:'🌑' };
const RARITY_COLOR = { 1:'#9CA3AF', 2:'#34D399', 3:'#3B82F6', 4:'#A855F7', 5:'#FACC15', 6:'#EF4444', 7:'#f472b6' };

let team = AQ.Storage.getTeam().map(id => (id && AQ.getCard(id)) ? id : null);
AQ.Storage.setTeam(team);
let inv = AQ.Storage.getInventory();
let engine = null;
let difficulty = 'normal';
let actingUnit = null;
let actingActionKey = null;
let resolveTurn = null;

function ownedCardOptions() {
  return inv.filter(u => AQ.getCard(u.cardId)).map(u => ({ unit: u, card: AQ.getCard(u.cardId) }));
}

function cardTooltipHTML(card) {
  return `
    <div class="font-bold mb-1">${card.name} · ${card.rarity}★</div>
    <div class="text-white/50 mb-2">${card.element} · ${card.role}</div>
    <div class="grid grid-cols-2 gap-1 text-white/70 mb-2">
      <span>HP ${card.hp}</span><span>ATK ${card.atk}</span>
      <span>DEF ${card.def}</span><span>SPD ${card.spd}</span>
    </div>
    ${card.skills.passive ? `<div class="text-[10px] text-amber-300 font-semibold">Bị Động: ${card.skills.passive.name}</div><div class="text-[10px] text-white/50">${card.skills.passive.desc}</div>` : ''}
  `;
}

function renderTeamSlots() {
  const wrap = document.getElementById('teamSlots');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    const filled = team[i];
    const card = filled ? AQ.getCard(filled) : null;
    slot.className = 'unitcard text-center';
    slot.innerHTML = card
      ? `<div style="color:${RARITY_COLOR[card.rarity]}" class="text-xs font-bold mb-1">${card.rarity}★</div>
         ${card.img ? `<img src="${card.img}" class="w-12 h-12 rounded-lg object-cover mx-auto mb-1">` : ''}
         <div class="text-sm font-semibold">${card.name}</div>
         <div class="text-[10px] text-white/50">${ELEMENT_ICON[card.element]} ${card.element} · ${card.role}</div>
         <div class="cardTooltip">${cardTooltipHTML(card)}</div>`
      : `<div class="text-white/30 text-sm py-6">+ Chọn Nhân Vật</div>`;
    slot.addEventListener('click', () => openPicker(i));
    wrap.appendChild(slot);
  }
}

function openPicker(slotIndex) {
  const options = ownedCardOptions();
  if (!options.length) { alert('Bạn chưa có nhân vật nào. Hãy triệu hồi trước.'); return; }
  const used = team.filter((id, i) => id && i !== slotIndex);
  const available = options.filter(o => !used.includes(o.unit.cardId));
  if (!available.length) { alert('Mỗi nhân vật chỉ được xếp 1 ô duy nhất, không còn nhân vật khác.'); return; }
  const names = available.map((o, i) => `${i + 1}. ${o.card.name} (${o.card.rarity}★)`).join('\n');
  const pick = prompt(`Chọn nhân vật cho ô ${slotIndex + 1} (mỗi nhân vật chỉ dùng được 1 lần):\n${names}`);
  const idx = parseInt(pick, 10) - 1;
  if (available[idx]) {
    team[slotIndex] = available[idx].unit.cardId;
    AQ.Storage.setTeam(team);
    renderTeamSlots();
  }
}

document.querySelectorAll('.diffbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    difficulty = btn.dataset.d;
    document.querySelectorAll('.diffbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
document.querySelector('.diffbtn[data-d="normal"]').classList.add('active');

const ENEMY_POOL = {
  easy: [
    { id: 'e101', name: 'Lính Tập Sự', rarity: 2, element: 'Earth', role: 'DPS', hp: 700, atk: 110, def: 60, spd: 70, skills: { basic:{name:'Chém'},skill:{name:'Đâm'},ultimate:{name:'Hỗn Loạn'} } },
    { id: 'e102', name: 'Cung Thủ Yếu', rarity: 2, element: 'Wind', role: 'DPS', hp: 650, atk: 100, def: 55, spd: 80, skills: { basic:{name:'Bắn'},skill:{name:'Bắn Nhanh'},ultimate:{name:'Loạn Tiễn'} } }
  ],
  normal: [
    { id: 'e001', name: 'Giặc Phương Bắc', rarity: 5, element: 'Dark', role: 'DPS', hp: 1400, atk: 190, def: 100, spd: 90, skills: { basic:{name:'Chém'},skill:{name:'Cung Tên'},ultimate:{name:'Vây Hãm'} } },
    { id: 'e002', name: 'Cung Thủ Địch', rarity: 4, element: 'Wind', role: 'DPS', hp: 1000, atk: 160, def: 70, spd: 105, skills: { basic:{name:'Bắn'},skill:{name:'Mưa Tên'},ultimate:{name:'Loạn Tiễn'} } },
    { id: 'e003', name: 'Khiên Binh Địch', rarity: 4, element: 'Earth', role: 'Tank', hp: 1700, atk: 110, def: 160, spd: 75, skills: { basic:{name:'Đâm'},skill:{name:'Phòng Thủ'},ultimate:{name:'Trấn Áp'} } }
  ],
  hard: [
    { id: 'e201', name: 'Tướng Giặc', rarity: 6, element: 'Dark', role: 'DPS', hp: 2000, atk: 230, def: 130, spd: 100, skills: { basic:{name:'Chém'},skill:{name:'Loạn Đao'},ultimate:{name:'Huyết Sát'} } },
    { id: 'e202', name: 'Pháp Sư Hắc Ám', rarity: 5, element: 'Dark', role: 'Debuffer', hp: 1300, atk: 200, def: 90, spd: 112, skills: { basic:{name:'Chú Thuật'},skill:{name:'Suy Yếu'},ultimate:{name:'Lời Nguyền'} } },
    { id: 'e203', name: 'Khiên Sắt Đại Tướng', rarity: 5, element: 'Earth', role: 'Tank', hp: 2200, atk: 140, def: 200, spd: 80, skills: { basic:{name:'Đâm'},skill:{name:'Trấn Thủ'},ultimate:{name:'Bất Khuất'} } },
    { id: 'e204', name: 'Sát Thủ Bóng Đêm', rarity: 5, element: 'Dark', role: 'DPS', hp: 1200, atk: 215, def: 75, spd: 130, skills: { basic:{name:'Ám Sát'},skill:{name:'Tốc Sát'},ultimate:{name:'Tử Diệt'} } }
  ],
  master: [
    { id: 'e301', name: 'Ma Vương', rarity: 7, element: 'Dark', role: 'DPS', hp: 2800, atk: 260, def: 150, spd: 115, skills: { basic:{name:'Hắc Diễm'},skill:{name:'Vực Thẳm'},ultimate:{name:'Tận Thế'} } },
    { id: 'e302', name: 'Hộ Vệ Ma Vương', rarity: 6, element: 'Earth', role: 'Tank', hp: 2600, atk: 160, def: 220, spd: 85, skills: { basic:{name:'Khiên Đập'},skill:{name:'Hộ Giá'},ultimate:{name:'Bất Tử'} } },
    { id: 'e303', name: 'Pháp Sư Tối Thượng', rarity: 6, element: 'Dark', role: 'Debuffer', hp: 1500, atk: 235, def: 100, spd: 118, skills: { basic:{name:'Hắc Pháp'},skill:{name:'Phong Ấn'},ultimate:{name:'Diệt Thế'} } },
    { id: 'e304', name: 'Sát Thủ Vô Hình', rarity: 6, element: 'Dark', role: 'DPS', hp: 1400, atk: 245, def: 90, spd: 140, skills: { basic:{name:'Ẩn Sát'},skill:{name:'Liên Hoàn'},ultimate:{name:'Tuyệt Sát'} } }
  ]
};

const DIFF_MULT = { easy: 0.8, normal: 1.0, hard: 1.25, master: 1.55 };

function buildEnemyUnits() {
  const mult = DIFF_MULT[difficulty];
  return ENEMY_POOL[difficulty].map(card => {
    const scaled = { ...card, hp: Math.round(card.hp * mult), atk: Math.round(card.atk * mult), def: Math.round(card.def * mult) };
    return new AQ.Unit(scaled, { level: 1, ascension: 0 }, 'enemy');
  });
}

function buildUnits() {
  const playerUnits = team.filter(Boolean).filter(cardId => AQ.getCard(cardId)).map(cardId => {
    const card = AQ.getCard(cardId);
    const u = inv.find(x => x.cardId === cardId) || { level: 1, ascension: 0 };
    return new AQ.Unit(card, u, 'player');
  });
  return { playerUnits, enemyUnits: buildEnemyUnits() };
}

function logLine(msg) {
  const log = document.getElementById('battleLog');
  const line = document.createElement('div');
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function previewDmg(attacker, action) {
  const mult = action === 'ultimate' ? AQ.CONST.ULT_MULT : action === 'skill' ? AQ.CONST.SKILL_MULT : AQ.CONST.BASIC_MULT;
  const enemyAlive = engine.units.filter(u => u.side !== attacker.side && u.alive);
  const avgDef = enemyAlive.reduce((s, u) => s + u.def, 0) / Math.max(1, enemyAlive.length);
  const raw = Math.max(attacker.atk * mult - avgDef * AQ.CONST.DEF_FACTOR, 1);
  return Math.round(raw);
}

function unitCardHTML(u) {
  const hpPct = Math.max(0, (u.hp / u.maxHp) * 100);
  const enPct = (u.energy / u.maxEnergy) * 100;
  const brPct = u.breakGauge;
  return `
    <div class="unitcard ${u.broken ? 'broken' : ''}" data-uid="${u.uid}">
      <div class="flex items-center gap-2 mb-1">
        ${u.card.img ? `<img src="${u.card.img}" class="w-8 h-8 rounded-md object-cover">` : ''}
        <div class="flex justify-between flex-1 text-sm font-semibold">
          <span>${ELEMENT_ICON[u.element]} ${u.card.name}</span>
          <span style="color:${RARITY_COLOR[u.card.rarity]}">${u.card.rarity}★</span>
        </div>
      </div>
      <div class="hpbar mb-1"><div class="hpfill" style="width:${hpPct}%"></div></div>
      <div class="hpbar mb-1"><div class="enfill" style="width:${enPct}%"></div></div>
      <div class="hpbar"><div class="brfill" style="width:${brPct}%"></div></div>
      <div class="text-[10px] text-white/40 mt-1">HP ${u.hp}/${u.maxHp} · EN ${u.energy} · BRK ${u.breakGauge} ${u.broken ? '· BREAK!' : ''}</div>
      <div class="cardTooltip">${cardTooltipHTML(u.card)}</div>
    </div>`;
}

function renderUnits() {
  document.getElementById('playerUnits').innerHTML = engine.units.filter(u => u.side === 'player').map(unitCardHTML).join('');
  document.getElementById('enemyUnits').innerHTML = engine.units.filter(u => u.side === 'enemy').map(unitCardHTML).join('');
  document.querySelectorAll('#enemyUnits .unitcard').forEach(el => {
    el.addEventListener('click', () => onEnemyClick(el.dataset.uid));
  });
}

function checkEnd() {
  if (!engine.isOver()) return false;
  const win = engine.winner() === 'player';
  document.getElementById('actionPanel').classList.add('hidden');
  document.getElementById('resultTitle').textContent = win ? 'CHIẾN THẮNG!' : 'THẤT BẠI';
  document.getElementById('resultTitle').style.color = win ? '#4ade80' : '#ef4444';
  document.getElementById('resultDesc').textContent = win ? 'Đội của bạn đã đánh bại kẻ địch.' : 'Đội của bạn đã bị đánh bại.';
  document.getElementById('resultModal').classList.remove('hidden');
  document.getElementById('resultModal').classList.add('flex');
  return true;
}

function actionLabel(key) {
  return key === 'ultimate' ? 'Tuyệt Kỹ' : key === 'skill' ? 'Chiêu Thức' : 'Cơ Bản';
}

function renderSkillButtons(unit) {
  const panel = document.getElementById('actionPanel');
  document.getElementById('actingName').textContent = unit.card.name;
  panel.classList.remove('hidden');
  const wrap = document.getElementById('skillButtons');
  wrap.innerHTML = '';
  [['basic', 0], ['skill', AQ.CONST.SKILL_ENERGY], ['ultimate', AQ.CONST.ULT_ENERGY_COST]].forEach(([key, cost]) => {
    const skill = unit.card.skills[key];
    const enough = unit.energy >= cost;
    const dmg = previewDmg(unit, key);
    const btn = document.createElement('button');
    btn.className = 'skillbtn';
    btn.disabled = !enough;
    btn.innerHTML = `
      <div class="font-bold text-sm mb-1">${actionLabel(key)}: ${skill.name}</div>
      <div class="text-[10px] text-white/50">Cần EN: ${cost}</div>
      <div class="skillTooltip">
        <div class="font-bold mb-1">${skill.name}</div>
        <div class="text-white/60 mb-2">${skill.desc || ''}</div>
        <div class="text-emerald-400 font-semibold">Sát thương dự kiến: ~${dmg}</div>
      </div>
    `;
    btn.addEventListener('click', () => {
      if (!enough) return;
      actingActionKey = key;
      document.querySelectorAll('.skillbtn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      logLine(`Chọn ${actionLabel(key)} [${skill.name}], hãy bấm vào kẻ địch để tấn công.`);
    });
    wrap.appendChild(btn);
  });
}

function onEnemyClick(uid) {
  if (!actingUnit || !actingActionKey || !resolveTurn) return;
  const target = engine.units.find(u => u.uid === uid && u.side === 'enemy' && u.alive);
  if (!target) return;
  resolveTurn(actingActionKey, target);
}

function aiChooseAction(unit, allies, enemies) {
  const lowHpAlly = allies.filter(u => u.alive).sort((a, b) => a.hp / a.maxHp - b.hp / b.maxHp)[0];
  const weakest = enemies.filter(u => u.alive).sort((a, b) => a.hp - b.hp)[0];
  const elemWeak = enemies.filter(u => u.alive && AQ.ELEMENT_ADV[unit.element] === u.element)[0];

  let action = unit.energy >= AQ.CONST.ULT_ENERGY_COST ? 'ultimate' : unit.energy >= AQ.CONST.SKILL_ENERGY ? 'skill' : 'basic';
  let target = elemWeak || weakest || enemies[0];

  if (difficulty === 'easy') {
    target = enemies[Math.floor(Math.random() * enemies.length)];
    action = 'basic';
  } else if (difficulty === 'normal') {
    target = elemWeak || enemies[0];
  } else if (difficulty === 'hard') {
    target = elemWeak || weakest;
    if (unit.role === 'Healer' && lowHpAlly && lowHpAlly.hp / lowHpAlly.maxHp < 0.5) {
      return { action, target: lowHpAlly };
    }
  } else if (difficulty === 'master') {
    target = elemWeak || (weakest && weakest.hp < unit.atk * 3 ? weakest : enemies.sort((a, b) => b.atk - a.atk)[0]);
    if (unit.role === 'Healer' && lowHpAlly && lowHpAlly.hp / lowHpAlly.maxHp < 0.65) {
      return { action, target: lowHpAlly };
    }
    if (unit.role === 'Debuffer' || unit.role === 'Buffer') {
      action = unit.energy >= AQ.CONST.SKILL_ENERGY ? 'skill' : 'basic';
    }
  }
  return { action, target };
}

function runEnemyTurn(unit) {
  const allies = engine.units.filter(u => u.side === 'enemy');
  const enemies = engine.units.filter(u => u.side === 'player' && u.alive);
  if (!enemies.length) return;
  const { action, target } = aiChooseAction(unit, allies, enemies);
  if (action === 'ultimate') engine.ultimateAttack(unit, target) ?? engine.basicAttack(unit, target);
  else if (action === 'skill') engine.skillAttack(unit, target) ?? engine.basicAttack(unit, target);
  else engine.basicAttack(unit, target);
}

async function runRoundManual() {
  engine.turnCount++;
  engine.buildTurnOrder();
  for (const unit of engine.turnOrder) {
    if (engine.isOver()) break;
    if (!unit.alive) continue;
    if (unit.broken && unit.brokenTurns > 0) {
      unit.brokenTurns--;
      if (unit.brokenTurns === 0) { unit.broken = false; unit.breakGauge = 100; }
      logLine(`${unit.card.name} đang choáng, bỏ lượt.`);
      renderUnits();
      continue;
    }
    if (unit.side === 'enemy') {
      runEnemyTurn(unit);
      renderUnits();
      if (checkEnd()) return;
      continue;
    }
    actingUnit = unit;
    renderUnits();
    renderSkillButtons(unit);
    await new Promise(resolve => {
      resolveTurn = (actionKey, target) => {
        if (actionKey === 'ultimate') engine.ultimateAttack(unit, target);
        else if (actionKey === 'skill') engine.skillAttack(unit, target);
        else engine.basicAttack(unit, target);
        actingUnit = null; actingActionKey = null; resolveTurn = null;
        renderUnits();
        resolve();
      };
    });
    if (checkEnd()) return;
  }
  document.getElementById('actionPanel').classList.add('hidden');
  if (!checkEnd()) {
    logLine(`— Hết lượt ${engine.turnCount}, lượt mới bắt đầu —`);
    runRoundManual();
  }
}

document.getElementById('startBattleBtn').addEventListener('click', () => {
  team = AQ.Storage.getTeam();
  inv = AQ.Storage.getInventory();
  const { playerUnits, enemyUnits } = buildUnits();
  if (!playerUnits.length) { alert('Hãy chọn ít nhất 1 nhân vật vào đội hình.'); return; }
  let uidCounter = 0;
  [...playerUnits, ...enemyUnits].forEach(u => u.uid = 'u' + (uidCounter++));
  engine = new AQ.BattleEngine(playerUnits, enemyUnits, logLine);
  document.getElementById('battleArea').classList.remove('hidden');
  document.getElementById('battleArea').classList.add('grid');
  document.getElementById('battleArea2').classList.remove('hidden');
  document.getElementById('battleLog').innerHTML = '';
  renderUnits();
  logLine(`— Bắt đầu trận đấu (Độ khó: ${difficulty.toUpperCase()}) —`);
  runRoundManual();
});

document.getElementById('resultCloseBtn').addEventListener('click', () => {
  document.getElementById('resultModal').classList.add('hidden');
  document.getElementById('resultModal').classList.remove('flex');
});

renderTeamSlots();
</script>
</body></html>
