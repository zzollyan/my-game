AQ.getCard = function (id) { return AQ.CARDS.find(c => c.id === id); };
/* AQ.Gacha — quay thẻ, pity system, lưu trữ kho */
window.AQ = window.AQ || {};

AQ.Storage = {
  KEY_INV: 'aq-inventory',
  KEY_PITY: 'aq-pity',
  KEY_CURRENCY: 'aq-currency',
  KEY_TEAM: 'aq-team',
  KEY_PROFILE: 'aq-profile',

  load(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; }
    catch { return fallback; }
  },
  save(key, val) { localStorage.setItem(key, JSON.stringify(val)); },

  getInventory() { return this.load(this.KEY_INV, []); },
  setInventory(inv) { this.save(this.KEY_INV, inv); },

  getPity() { return this.load(this.KEY_PITY, { count: 0, count6: 0, count7: 0 }); },
  setPity(p) { this.save(this.KEY_PITY, p); },

  getCurrency() { return this.load(this.KEY_CURRENCY, { gem: 1600, ticket: 10 }); },
  setCurrency(c) { this.save(this.KEY_CURRENCY, c); },

  getTeam() { return this.load(this.KEY_TEAM, [null, null, null, null]); },
  setTeam(t) { this.save(this.KEY_TEAM, t); }
};

AQ.Gacha = {
  COST_GEM: 160,

  /** trả về tỉ lệ hiện tại đã áp dụng pity mềm */
  currentRates(pity) {
    const r = {};
    for (const k in AQ.RARITY) r[k] = AQ.RARITY[k].rateBase;
    if (pity.count >= AQ.CONST.PITY_SOFT) {
      const bonus = (pity.count - AQ.CONST.PITY_SOFT + 1) * 4;
      r[5] += bonus; r[6] += bonus * 0.3;
    }
    return r;
  },

  rollRarity(pity) {
    if (pity.count7 + 1 >= AQ.CONST.PITY_HARD_7) return 7;
    if (pity.count6 + 1 >= AQ.CONST.PITY_HARD_6) return 6;
    if (pity.count + 1 >= AQ.CONST.PITY_HARD) return Math.random() < 0.15 ? 6 : 5;

    const rates = this.currentRates(pity);
    const total = Object.values(rates).reduce((a, b) => a + b, 0);
    let roll = Math.random() * total;
    for (const k of [7, 6, 5, 4, 3, 2, 1]) {
      if (roll < rates[k]) return k;
      roll -= rates[k];
    }
    return 1;
  },

  pickCardByRarity(rarity) {
    const pool = AQ.CARDS.filter(c => c.rarity === rarity);
    if (!pool.length) return AQ.CARDS[AQ.CARDS.length - 1];
    return pool[Math.floor(Math.random() * pool.length)];
  },

  updatePity(pity, rarity) {
    pity.count++; pity.count6++; pity.count7++;
    if (rarity >= 5) pity.count = 0;
    if (rarity >= 6) pity.count6 = 0;
    if (rarity >= 7) pity.count7 = 0;
    return pity;
  },

  /** quay n lần, trả {results:[{card,rarity,isNew}], pity, currency} */
  pull(n = 1) {
    const currency = AQ.Storage.getCurrency();
    const cost = this.COST_GEM * n;
    if (currency.gem < cost) return { error: 'NOT_ENOUGH_GEM' };
    currency.gem -= cost;

    let pity = AQ.Storage.getPity();
    const inv = AQ.Storage.getInventory();
    const results = [];

    for (let i = 0; i < n; i++) {
      const rarity = this.rollRarity(pity);
      pity = this.updatePity(pity, rarity);
      const card = this.pickCardByRarity(rarity);
      const existing = inv.find(x => x.cardId === card.id);
      const isNew = !existing;
      if (existing) existing.dupes = (existing.dupes || 0) + 1;
      else inv.push({ cardId: card.id, level: 1, ascension: 0, skillLv: { basic: 1, skill: 1, ultimate: 1 }, dupes: 0, equipment: [] });
      results.push({ card, rarity, isNew });
    }

    AQ.Storage.setCurrency(currency);
    AQ.Storage.setPity(pity);
    AQ.Storage.setInventory(inv);
    return { results, pity, currency };
  },

  /** thời lượng animation gợi ý (ms) theo sao, dùng cho UI */
  animDuration(rarity) {
    return rarity >= 7 ? 4500 : rarity >= 6 ? 3200 : rarity >= 5 ? 2600 : rarity >= 4 ? 1800 : 1000;
  }
};
/* AQ.Battle — turn-based theo SPD, break gauge, element advantage */
window.AQ = window.AQ || {};

AQ.Progression = {
  statAtLevel(base, level, ascension) {
    const lvFactor = 1 + (level - 1) * 0.045;
    const ascFactor = 1 + ascension * 0.12;
    return Math.round(base * lvFactor * ascFactor);
  },
  resolvedStats(card, unit) {
    const lvl = unit.level || 1, asc = unit.ascension || 0;
    return {
      hp: this.statAtLevel(card.hp, lvl, asc),
      atk: this.statAtLevel(card.atk, lvl, asc),
      def: this.statAtLevel(card.def, lvl, asc),
      spd: card.spd + Math.floor(asc * 1.5),
      maxEnergy: 100
    };
  }
};

AQ.Unit = class {
  constructor(card, unitData, side) {
    this.card = card;
    this.side = side; // 'player' | 'enemy'
    const stats = AQ.Progression.resolvedStats(card, unitData || {});
    this.maxHp = stats.hp; this.hp = stats.hp;
    this.atk = stats.atk; this.def = stats.def; this.spd = stats.spd;
    this.energy = 0; this.maxEnergy = 100;
    this.element = card.element; this.role = card.role;
    this.breakGauge = 100; this.broken = false; this.brokenTurns = 0;
    this.buffs = []; this.debuffs = [];
    this.alive = true;
  }
  isElementWeakAgainst(attackerElement) {
    return AQ.ELEMENT_ADV[attackerElement] === this.element;
  }
};

AQ.BattleEngine = class {
  constructor(playerUnits, enemyUnits, log = console.log) {
    this.units = [...playerUnits, ...enemyUnits];
    this.turnOrder = [];
    this.log = log;
    this.turnCount = 0;
  }

  buildTurnOrder() {
    this.turnOrder = this.units
      .filter(u => u.alive)
      .sort((a, b) => b.spd - a.spd);
  }

  damage(attacker, target, mult, actionElement) {
    let raw = attacker.atk * mult - target.def * AQ.CONST.DEF_FACTOR;
    raw = Math.max(raw, 1);

    const isAdv = AQ.ELEMENT_ADV[attacker.element] === target.element;
    if (isAdv) raw *= AQ.CONST.ELEMENT_ADV_MULT;

    if (target.broken) raw *= AQ.CONST.BREAK_STUN_MULT;

    if (isAdv && !target.broken) {
      target.breakGauge -= 25;
      if (target.breakGauge <= 0) {
        target.breakGauge = 0;
        target.broken = true;
        target.brokenTurns = 1;
        this.log(`${target.card.name} bị BREAK! Choáng + nhận 50% dmg tăng.`);
      }
    }

    target.hp = Math.max(0, target.hp - Math.round(raw));
    if (target.hp === 0) target.alive = false;
    return Math.round(raw);
  }

  basicAttack(attacker, target) {
    const dmg = this.damage(attacker, target, AQ.CONST.BASIC_MULT);
    attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + AQ.CONST.BASIC_ENERGY);
    this.log(`${attacker.card.name} dùng [${attacker.card.skills.basic.name}] gây ${dmg} dmg lên ${target.card.name}.`);
    return dmg;
  }

  skillAttack(attacker, target) {
    if (attacker.energy < AQ.CONST.SKILL_ENERGY) return null;
    const dmg = this.damage(attacker, target, AQ.CONST.SKILL_MULT);
    attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + AQ.CONST.SKILL_ENERGY);
    this.log(`${attacker.card.name} dùng [${attacker.card.skills.skill.name}] gây ${dmg} dmg lên ${target.card.name}.`);
    return dmg;
  }

  ultimateAttack(attacker, target) {
    if (attacker.energy < AQ.CONST.ULT_ENERGY_COST) return null;
    const dmg = this.damage(attacker, target, AQ.CONST.ULT_MULT);
    attacker.energy = 0;
    this.log(`${attacker.card.name} kích hoạt TUYỆT KỸ [${attacker.card.skills.ultimate.name}] gây ${dmg} dmg lên ${target.card.name}!`);
    return dmg;
  }

  takeTurn(unit, chooseAction, chooseTarget) {
    if (!unit.alive) return;
    if (unit.broken && unit.brokenTurns > 0) {
      unit.brokenTurns--;
      if (unit.brokenTurns === 0) { unit.broken = false; unit.breakGauge = 100; }
      this.log(`${unit.card.name} đang choáng, bỏ lượt.`);
      return;
    }
    const enemies = this.units.filter(u => u.side !== unit.side && u.alive);
    if (!enemies.length) return;
    const target = chooseTarget ? chooseTarget(unit, enemies) : enemies[0];
    const action = chooseAction ? chooseAction(unit) : (unit.energy >= AQ.CONST.ULT_ENERGY_COST ? 'ultimate' : unit.energy >= AQ.CONST.SKILL_ENERGY ? 'skill' : 'basic');

    if (action === 'ultimate') this.ultimateAttack(unit, target) ?? this.basicAttack(unit, target);
    else if (action === 'skill') this.skillAttack(unit, target) ?? this.basicAttack(unit, target);
    else this.basicAttack(unit, target);
  }

  isOver() {
    const p = this.units.some(u => u.side === 'player' && u.alive);
    const e = this.units.some(u => u.side === 'enemy' && u.alive);
    return !p || !e;
  }

  winner() {
    if (!this.isOver()) return null;
    return this.units.some(u => u.side === 'player' && u.alive) ? 'player' : 'enemy';
  }

  runRound(chooseAction, chooseTarget) {
    this.turnCount++;
    this.buildTurnOrder();
    for (const unit of this.turnOrder) {
      if (this.isOver()) break;
      this.takeTurn(unit, chooseAction, chooseTarget);
    }
  }
};
</script>

</section>

<div id="resultModal" class="fixed inset-0 hidden items-center justify-center bg-black/80 z-50">
  <div class="bg-[#15171d] border border-white/10 rounded-2xl p-8 text-center max-w-sm w-full">
    <h2 id="resultTitle" class="title text-3xl font-bold mb-2"></h2>
    <p id="resultDesc" class="text-white/60 mb-6"></p>
    <button id="resultCloseBtn" class="px-6 py-3 bg-white text-black rounded-xl font-bold uppercase tracking-widest text-sm w-full">Đóng</button>
  </div>
</div>

<script>
const ELEMENT_ICON = { Fire:'🔥', Water:'💧', Wind:'🌪️', Earth:'🪨', Light:'✨', Dark:'🌑' };
const RARITY_COLOR = { 1:'#9CA3AF', 2:'#34D399', 3:'#3B82F6', 4:'#A855F7', 5:'#FACC15', 6:'#EF4444', 7:'#f472b6' };

let team = AQ.Storage.getTeam();
let inv = AQ.Storage.getInventory();
let engine = null;

function ownedCardOptions() {
  return inv.map(u => ({ unit: u, card: AQ.getCard(u.cardId) })).filter(x => x.card);
}

function renderTeamSlots() {
  const wrap = document.getElementById('teamSlots');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement('div');
    const filled = team[i];
    const card = filled ? AQ.getCard(filled) : null;
    slot.className = 'unitcard cursor-pointer text-center';
    slot.innerHTML = card
      ? `<div style="color:${RARITY_COLOR[card.rarity]}" class="text-xs font-bold mb-1">${card.rarity}★</div>
         <div class="text-sm font-semibold">${card.name}</div>
         <div class="text-[10px] text-white/50">${ELEMENT_ICON[card.element]} ${card.element} · ${card.role}</div>`
      : `<div class="text-white/30 text-sm py-6">+ Chọn Nhân Vật</div>`;
    slot.addEventListener('click', () => openPicker(i));
    wrap.appendChild(slot);
  }
}

function openPicker(slotIndex) {
  const options = ownedCardOptions();
  if (!options.length) { alert('Bạn chưa có nhân vật nào. Hãy triệu hồi trước.'); return; }
  const names = options.map((o, i) => `${i + 1}. ${o.card.name} (${o.card.rarity}★)`).join('\n');
  const pick = prompt(`Chọn nhân vật cho ô ${slotIndex + 1}:\n${names}`);
  const idx = parseInt(pick, 10) - 1;
  if (options[idx]) {
    team[slotIndex] = options[idx].unit.cardId;
    AQ.Storage.setTeam(team);
    renderTeamSlots();
  }
}

const ENEMY_TEAM = [
  { id: 'e001', name: 'Giặc Phương Bắc', rarity: 5, element: 'Dark', role: 'DPS', hp: 1400, atk: 190, def: 100, spd: 90, energy: 0, skills: { basic:{name:'Chém'},skill:{name:'Cung Tên'},ultimate:{name:'Vây Hãm'} } },
  { id: 'e002', name: 'Cung Thủ Địch', rarity: 4, element: 'Wind', role: 'DPS', hp: 1000, atk: 160, def: 70, spd: 105, energy: 0, skills: { basic:{name:'Bắn'},skill:{name:'Mưa Tên'},ultimate:{name:'Loạn Tiễn'} } },
  { id: 'e003', name: 'Khiên Binh Địch', rarity: 4, element: 'Earth', role: 'Tank', hp: 1700, atk: 110, def: 160, spd: 75, energy: 0, skills: { basic:{name:'Đâm'},skill:{name:'Phòng Thủ'},ultimate:{name:'Trấn Áp'} } }
];

function buildUnits() {
  const playerUnits = team.filter(Boolean).map(cardId => {
    const card = AQ.getCard(cardId);
    const u = inv.find(x => x.cardId === cardId) || { level: 1, ascension: 0 };
    return new AQ.Unit(card, u, 'player');
  });
  const enemyUnits = ENEMY_TEAM.map(card => new AQ.Unit(card, { level: 1, ascension: 0 }, 'enemy'));
  return { playerUnits, enemyUnits };
}

function logLine(msg) {
  const log = document.getElementById('battleLog');
  const line = document.createElement('div');
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function unitCardHTML(u) {
  const hpPct = Math.max(0, (u.hp / u.maxHp) * 100);
  const enPct = (u.energy / u.maxEnergy) * 100;
  return `
    <div class="unitcard ${u.broken ? 'broken' : ''}" data-id="${u.card.id}-${u.side}">
      <div class="flex justify-between text-sm font-semibold mb-1">
        <span>${ELEMENT_ICON[u.element]} ${u.card.name}</span>
        <span style="color:${RARITY_COLOR[u.card.rarity]}">${u.card.rarity}★</span>
      </div>
      <div class="hpbar mb-1"><div class="hpfill" style="width:${hpPct}%"></div></div>
      <div class="hpbar"><div class="enfill" style="width:${enPct}%"></div></div>
      <div class="text-[10px] text-white/40 mt-1">HP ${u.hp}/${u.maxHp} · EN ${u.energy} · SPD ${u.spd} ${u.broken ? '· BREAK!' : ''}</div>
    </div>`;
}

function renderUnits() {
  document.getElementById('playerUnits').innerHTML = engine.units.filter(u => u.side === 'player').map(unitCardHTML).join('');
  document.getElementById('enemyUnits').innerHTML = engine.units.filter(u => u.side === 'enemy').map(unitCardHTML).join('');
}

function checkEnd() {
  if (!engine.isOver()) return false;
  const win = engine.winner() === 'player';
  document.getElementById('resultTitle').textContent = win ? 'CHIẾN THẮNG!' : 'THẤT BẠI';
  document.getElementById('resultTitle').style.color = win ? '#4ade80' : '#ef4444';
  document.getElementById('resultDesc').textContent = win ? 'Đội của bạn đã đánh bại kẻ địch.' : 'Đội của bạn đã bị đánh bại.';
  document.getElementById('resultModal').classList.remove('hidden');
  document.getElementById('resultModal').classList.add('flex');
  return true;
}

document.getElementById('startBattleBtn').addEventListener('click', () => {
  team = AQ.Storage.getTeam();
  inv = AQ.Storage.getInventory();
  const { playerUnits, enemyUnits } = buildUnits();
  if (!playerUnits.length) { alert('Hãy chọn ít nhất 1 nhân vật vào đội hình.'); return; }
  engine = new AQ.BattleEngine(playerUnits, enemyUnits, logLine);
  document.getElementById('battleArea').classList.remove('hidden');
  document.getElementById('battleArea').classList.add('grid');
  document.getElementById('battleArea2').classList.remove('hidden');
  document.getElementById('battleLog').innerHTML = '';
  renderUnits();
});

document.getElementById('nextRoundBtn').addEventListener('click', () => {
  if (!engine || engine.isOver()) return;
  logLine(`— Lượt ${engine.turnCount + 1} —`);
  engine.runRound();
  renderUnits();
  checkEnd();
});

document.getElementById('autoBattleBtn').addEventListener('click', () => {
  team = AQ.Storage.getTeam();
  inv = AQ.Storage.getInventory();
  const { playerUnits, enemyUnits } = buildUnits();
  if (!playerUnits.length) { alert('Hãy chọn ít nhất 1 nhân vật vào đội hình.'); return; }
  engine = new AQ.BattleEngine(playerUnits, enemyUnits, logLine);
  document.getElementById('battleArea').classList.remove('hidden');
  document.getElementById('battleArea').classList.add('grid');
  document.getElementById('battleArea2').classList.remove('hidden');
  document.getElementById('battleLog').innerHTML = '';
  let guard = 0;
  while (!engine.isOver() && guard < 50) {
    logLine(`— Lượt ${engine.turnCount + 1} —`);
    engine.runRound();
    guard++;
  }
  renderUnits();
  checkEnd();
});

document.getElementById('resultCloseBtn').addEventListener('click', () => {
  document.getElementById('resultModal').classList.add('hidden');
  document.getElementById('resultModal').classList.remove('flex');
});

renderTeamSlots();
</script>
</body></html>
